set timeout=0
set default=0

# Let GRUB do the graphics/VBE work itself while it still has BIOS access.
# Prefer smaller window-friendly modes first so external QEMU frontends remain usable.
insmod all_video
insmod gfxterm
set gfxmode=1024x768x32,800x600x32,1280x720x32,auto
set gfxpayload=keep
terminal_output gfxterm
terminal_input console

menuentry "LC(OS)" {
    multiboot2 /boot/lcos.elf
    module2 /boot/fs.img fsimg
    boot
}
